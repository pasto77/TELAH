<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge d'applications</title>
    <style>
        body { font-family: system-ui; background: #0a0a0a; color: #eee; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        textarea, select, button { width: 100%; margin: 0.5rem 0; padding: 0.8rem; border-radius: 8px; border: none; }
        textarea { background: #1e1e1e; color: #fff; }
        button { background: #ff4500; color: white; font-weight: bold; cursor: pointer; }
        .preview { margin-top: 2rem; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 500px; border: none; background: white; }
        .loading { display: none; text-align: center; margin: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 Forge ton application</h1>
    <textarea id="prompt" rows="5" placeholder="Décris ton application..."></textarea>
    <select id="language">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="es">Español</option>
    </select>
    <select id="appType">
        <option value="vitrine">Site Vitrine</option>
        <option value="gestion">Gestion</option>
        <option value="marketplace">Marketplace</option>
    </select>
    <div>
        <label><input type="checkbox" value="mtn"> MTN MoMo</label>
        <label><input type="checkbox" value="orange"> Orange Money</label>
        <label><input type="checkbox" value="wave"> Wave</label>
    </div>
    <button id="forgeBtn">Lancer la forge</button>
    <div class="loading" id="loading">⏳ Forge en cours...</div>
    <div class="preview" id="preview" style="display:none;">
        <iframe id="previewFrame"></iframe>
        <a id="downloadLink" style="display:inline-block; margin-top:1rem; background:#ff4500; padding:0.5rem 1rem; border-radius:5px; color:white; text-decoration:none;">Télécharger</a>
    </div>
</div>

<script>
    document.getElementById('forgeBtn').addEventListener('click', async () => {
        const prompt = document.getElementById('prompt').value;
        const language = document.getElementById('language').value;
        const appType = document.getElementById('appType').value;
        const payments = [...document.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);

        if (!prompt) return alert('Décris ton application');

        const loading = document.getElementById('loading');
        const preview = document.getElementById('preview');
        loading.style.display = 'block';
        preview.style.display = 'none';

        try {
            const response = await fetch('/api/forge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, language, appType, payments })
            });
            const data = await response.json();
            if (!data.success) throw new Error(data.error);

            const blob = new Blob([data.appCode], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            document.getElementById('previewFrame').src = url;
            document.getElementById('downloadLink').href = url;
            document.getElementById('downloadLink').download = 'app.html';
            preview.style.display = 'block';
        } catch (err) {
            alert('Erreur : ' + err.message);
        } finally {
            loading.style.display = 'none';
        }
    });
</script>
</body>
</html>
